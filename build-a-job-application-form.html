<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Job Application Form</h1>

    <form id="job-application" novalidate>
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input
                type="text"
                name="name"
                id="name"
                placeholder="e.g. Lucas Mazacotte"
                required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input
                type="email"
                name="email"
                id="email"
                placeholder="tortugoncho@example.com"
                required>
        </div>

        <div class="form-group">
            <label for="position">Position applying for</label>
            <select id="position" name="position" required>
                <option value="" disabled selected>Select a role</option>
                <option value="ai-researcher">AI Research Engineer</option>
                <option value="ml-engineer">Machine Learning Engineer</option>
                <option value="software-engineer">Software Engineer</option>
                <option value="data-scientist">Data Scientist</option>
                <option value="infrastructure">Infrastructure Engineer</option>
                <option value="other">Other</option>
            </select>
        </div>

        <fieldset class="radio-group">
            <legend>Availability</legend>
            <div class="radio-button">
                <input
                    type="radio"
                    name="availability"
                    id="full-time"
                    value="Full-Time"
                    required>
                <label for="full-time">Full-Time</label>
            </div>
            <div class="radio-button">
                <input
                    type="radio"
                    name="availability"
                    id="part-time"
                    value="Part-Time"
                    required>
                <label for="part-time">Part-Time</label>
            </div>
        </fieldset>

        <div class="form-group">
            <label for="message">Why do you want to join us? / Cover message</label>
            <textarea
                name="message"
                id="message"
                rows="6"
                placeholder="Tell us why this opportunity excites you..."
                required></textarea>
        </div>

        <button type="submit">Submit Application</button>
    </form>
</div>
</body>
</html>
