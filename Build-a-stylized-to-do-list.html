<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stylized To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main>
    <h1>Mi Meridiano diario</h1>

    <ul class="todo-list">
      <li>
        <input type="checkbox" id="task1">
        <label for="task1">Aprender  CSS</label>
        
        <ul class="sub-item">
          <li>
            <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Pseudo-classes" 
               class="sub-item-link" 
               target="_blank">
               MDN Pseudo-classes Guide
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="task2">
        <label for="task2">Crear 5 paginas web</label>
        
        <ul class="sub-item">
          <li>
            <a href="https://css-tricks.com/almanac/selectors/a/" 
               class="sub-item-link" 
               target="_blank">
               CSS-Tricks :link / :visited / :hover
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="task3">
        <label for="task3">Practicar python</label>
        
        <ul class="sub-item">
          <li>
            <a href="https://web.dev/learn/html/semantic-html/" 
               class="sub-item-link" 
               target="_blank">
               Semantic HTML Best Practices
            </a>
          </li>
        </ul>
      </li>

      <li>
        <input type="checkbox" id="task4">
        <label for="task4">Ejercicio y Ocio vario</label>
        
        <ul class="sub-item">
          <li>
            <a href="https://www.mayoclinic.org/healthy-lifestyle/nutrition-and-healthy-eating/in-depth/water/art-20044256" 
               class="sub-item-link" 
               target="_blank">
               Why hydration matters (Mayo Clinic)
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </main>

</body>
</html>
